<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Demo — Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --sre-primary: #1a2332;
            --sre-accent: #0d6efd;
            --sre-surface: #f8f9fb;
            --sre-success: #198754;
            --sre-warning: #e8a317;
            --sre-orange: #e67e22;
            --sre-info: #0dcaf0;
        }
        body { background: var(--sre-surface); font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar-sre {
            background: var(--sre-primary);
            padding: .75rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }
        .navbar-sre .navbar-brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: .3px;
        }
        .navbar-sre .navbar-brand i { color: var(--sre-accent); margin-right: .5rem; }
        .health-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #6c757d;
            margin-right: 6px;
            vertical-align: middle;
            transition: background .3s;
        }
        .health-dot.up { background: var(--sre-success); box-shadow: 0 0 6px rgba(25,135,84,.5); }
        .health-dot.down { background: #dc3545; box-shadow: 0 0 6px rgba(220,53,69,.5); }
        .health-label { color: rgba(255,255,255,.7); font-size: .82rem; }
        .stat-card {
            background: #fff;
            border-radius: .75rem;
            padding: 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            border: 1px solid #e9ecef;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--sre-primary);
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: .78rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: .25rem;
        }
        .card-panel {
            background: #fff;
            border-radius: .75rem;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            border: 1px solid #e9ecef;
        }
        .card-panel .card-header-sre {
            padding: .85rem 1.25rem;
            border-bottom: 1px solid #e9ecef;
            font-weight: 600;
            font-size: .95rem;
            color: var(--sre-primary);
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .table-sre { margin-bottom: 0; font-size: .88rem; }
        .table-sre thead th {
            background: #f1f3f5;
            font-weight: 600;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .4px;
            color: #495057;
            border-bottom-width: 1px;
            padding: .65rem .75rem;
        }
        .table-sre td { vertical-align: middle; padding: .6rem .75rem; }
        .badge-status {
            font-size: .75rem;
            font-weight: 600;
            padding: .3em .65em;
            border-radius: .35rem;
        }
        .status-Completed { background: #d1e7dd; color: #0f5132; }
        .status-Pending   { background: #fff3cd; color: #664d03; }
        .status-Processing{ background: #fde8d0; color: #7c4a1a; }
        .status-Paid      { background: #cfe2ff; color: #084298; }
        .status-default   { background: #e2e3e5; color: #41464b; }
        .btn-pay { padding: .2rem .55rem; font-size: .78rem; }
        .btn-del { padding: .2rem .55rem; font-size: .78rem; }
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
        .form-label { font-size: .82rem; font-weight: 600; color: #495057; }
        .breakdown-row { display: flex; justify-content: space-between; padding: .35rem 0; font-size: .88rem; }
        .breakdown-row + .breakdown-row { border-top: 1px solid #f1f3f5; }
        .empty-state { padding: 3rem 1rem; text-align: center; color: #adb5bd; }
        .empty-state i { font-size: 2.5rem; margin-bottom: .75rem; display: block; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-sre">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-box-seam-fill"></i>SRE Demo — Order Management</span>
        <span class="d-flex align-items-center gap-2">
            <span class="health-dot" id="healthDot"></span>
            <span class="health-label" id="healthLabel">Checking…</span>
        </span>
    </div>
</nav>

<div class="container py-4">

    <!-- Stats Row -->
    <div class="row g-3 mb-4" id="statsRow">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-label">Total Orders</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-value" id="statRevenue">—</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-value" id="statCompleted">—</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-value" id="statPending">—</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
    </div>

    <!-- Status Breakdown -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card-panel h-100">
                <div class="card-header-sre"><i class="bi bi-bar-chart-fill text-primary"></i>Status Breakdown</div>
                <div class="p-3" id="breakdownBody">
                    <div class="text-muted text-center py-3" style="font-size:.85rem">Loading…</div>
                </div>
            </div>
        </div>

        <!-- Create Order Form -->
        <div class="col-md-8">
            <div class="card-panel h-100">
                <div class="card-header-sre"><i class="bi bi-plus-circle-fill text-success"></i>Create New Order</div>
                <div class="p-3">
                    <form id="createForm" class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">Customer Name</label>
                            <input type="text" class="form-control form-control-sm" id="fCustomer" required placeholder="e.g. Acme Corp">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Product</label>
                            <input type="text" class="form-control form-control-sm" id="fProduct" required placeholder="e.g. Cloud License">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Amount ($)</label>
                            <input type="number" step="0.01" min="0" class="form-control form-control-sm" id="fAmount" required placeholder="0.00">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100" id="btnCreate">
                                <i class="bi bi-plus-lg"></i> Add
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Orders Table -->
    <div class="card-panel mb-4">
        <div class="card-header-sre d-flex justify-content-between">
            <span><i class="bi bi-table me-1 text-primary"></i>Orders</span>
            <button class="btn btn-outline-secondary btn-sm" onclick="refresh()" title="Refresh">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
        <div class="table-responsive">
            <table class="table table-sre table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th class="text-end">Amount</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <tr><td colspan="7" class="empty-state"><i class="bi bi-inbox"></i>Loading orders…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastBox"></div>

<script>
const API = '/api';

// ── Helpers ──────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function fmt(n) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
}

function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
         + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function statusClass(s) {
    return ['Completed','Pending','Processing','Paid'].includes(s) ? 'status-' + s : 'status-default';
}

function showToast(msg, type = 'success') {
    const id = 'toast-' + Date.now();
    const icon = type === 'success' ? 'check-circle-fill' : 'exclamation-triangle-fill';
    const bg = type === 'success' ? 'text-bg-success' : 'text-bg-danger';
    $('toastBox').insertAdjacentHTML('beforeend',
        `<div id="${id}" class="toast ${bg} border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body"><i class="bi bi-${icon} me-2"></i>${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>`);
    const el = document.getElementById(id);
    const t = new bootstrap.Toast(el, { delay: 4000 });
    t.show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
}

// ── Data Loading ─────────────────────────────────────
async function loadOrders() {
    try {
        const res = await fetch(API + '/orders');
        if (!res.ok) throw new Error('Failed to load orders');
        const orders = await res.json();
        renderOrders(orders);
    } catch (e) {
        $('ordersBody').innerHTML = `<tr><td colspan="7" class="empty-state"><i class="bi bi-exclamation-triangle"></i>${e.message}</td></tr>`;
    }
}

async function loadStats() {
    try {
        const res = await fetch(API + '/orders/stats');
        if (!res.ok) throw new Error('Stats unavailable');
        const s = await res.json();
        $('statTotal').textContent = s.totalOrders;
        $('statRevenue').textContent = fmt(s.totalRevenue);

        const find = (st) => s.byStatus.find(b => b.status === st);
        $('statCompleted').textContent = (find('Completed')?.count || 0) + (find('Paid')?.count || 0);
        $('statPending').textContent = (find('Pending')?.count || 0) + (find('Processing')?.count || 0);

        let html = '';
        for (const b of s.byStatus) {
            html += `<div class="breakdown-row">
                <span><span class="badge badge-status ${statusClass(b.status)}">${b.status}</span></span>
                <span class="text-muted">${b.count} order${b.count !== 1 ? 's' : ''}</span>
                <span class="fw-semibold">${fmt(b.revenue)}</span>
            </div>`;
        }
        $('breakdownBody').innerHTML = html || '<div class="text-muted text-center py-2">No data</div>';
    } catch (e) {
        $('statTotal').textContent = '—';
        $('statRevenue').textContent = '—';
    }
}

async function checkHealth() {
    try {
        const res = await fetch(API + '/health');
        if (!res.ok) throw new Error();
        $('healthDot').className = 'health-dot up';
        $('healthLabel').textContent = 'Healthy';
    } catch {
        $('healthDot').className = 'health-dot down';
        $('healthLabel').textContent = 'Unhealthy';
    }
}

function refresh() {
    loadOrders();
    loadStats();
    checkHealth();
}

// ── Rendering ────────────────────────────────────────
function renderOrders(orders) {
    if (!orders.length) {
        $('ordersBody').innerHTML = '<tr><td colspan="7" class="empty-state"><i class="bi bi-inbox"></i>No orders yet — create one above.</td></tr>';
        return;
    }
    $('ordersBody').innerHTML = orders.map(o => `
        <tr>
            <td class="fw-semibold">#${o.id}</td>
            <td>${esc(o.customerName)}</td>
            <td>${esc(o.product)}</td>
            <td class="text-end">${fmt(o.amount)}</td>
            <td><span class="badge badge-status ${statusClass(o.status)}">${o.status}</span></td>
            <td class="text-muted">${fmtDate(o.createdAt)}</td>
            <td class="text-end text-nowrap">
                ${o.status !== 'Paid' && o.status !== 'Completed' ? `<button class="btn btn-outline-primary btn-pay me-1" onclick="payOrder(${o.id})" title="Pay"><i class="bi bi-credit-card"></i></button>` : ''}
                <button class="btn btn-outline-danger btn-del" onclick="deleteOrder(${o.id})" title="Delete"><i class="bi bi-trash3"></i></button>
            </td>
        </tr>`).join('');
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ── Actions ──────────────────────────────────────────
$('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = $('btnCreate');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';
    try {
        const body = {
            customerName: $('fCustomer').value.trim(),
            product: $('fProduct').value.trim(),
            amount: parseFloat($('fAmount').value)
        };
        const res = await fetch(API + '/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('Failed to create order');
        showToast('Order created successfully');
        $('createForm').reset();
        refresh();
    } catch (err) {
        showToast(err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-plus-lg"></i> Add';
    }
});

async function payOrder(id) {
    const btn = event.currentTarget;
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';
    try {
        const res = await fetch(API + '/orders/' + id + '/pay', { method: 'POST' });
        if (!res.ok) {
            const errData = await res.text();
            throw new Error(errData || 'Payment failed');
        }
        showToast('Payment successful for order #' + id);
        refresh();
    } catch (err) {
        showToast('Payment failed for order #' + id + ': ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-credit-card"></i>';
    }
}

async function deleteOrder(id) {
    if (!confirm('Delete order #' + id + '?')) return;
    try {
        const res = await fetch(API + '/orders/' + id, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to delete order');
        showToast('Order #' + id + ' deleted');
        refresh();
    } catch (err) {
        showToast(err.message, 'error');
    }
}

// ── Init ─────────────────────────────────────────────
refresh();
setInterval(checkHealth, 30000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
